services:
  easyproxy:
    image: ghcr.io/realbestia1/easyproxy:full
    container_name: easyproxy
    restart: unless-stopped
    shm_size: "2gb"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - '${PORT:-7860}:${PORT:-7860}'
    environment:
      - API_PASSWORD=ep
      - PORT=7860
      - FLARESOLVERR_TIMEOUT=30
      - ENABLE_WARP=false        # Imposta a true per attivare WARP integrato
      - WARP_LICENSE_KEY=        # Inserisci qui la tua chiave WARP+ (opzionale)
      # - GLOBAL_PROXY=          # Non più strettamente necessario se WARP è attivo